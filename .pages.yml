media:
  input: public/media
  output: /media

content:
  - name: projects
    label: Projects
    type: file
    path: src/data/projects.json
    format: json
    list: true
    fields:
      - name: name
        label: Project name
        type: string
        required: true
      - name: location
        label: Location
        type: string
        required: true
      - name: discipline
        label: Discipline
        type: string
        required: true
      - name: year
        label: Year
        type: number
        required: true

  - name: contact
    label: Contact
    type: file
    path: src/data/contact.json
    format: json
    fields:
      - name: eyebrow
        label: Eyebrow
        type: string
        required: true
      - name: heading
        label: Heading
        type: string
        required: true
      - name: introduction
        label: Introduction
        type: text
        required: true
      - name: email
        label: Email address
        type: string
        required: true
      - name: phone
        label: Phone number
        type: string
      - name: address
        label: Address
        type: text
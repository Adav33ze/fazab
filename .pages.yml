media:
  - name: homeImages
    label: Home images
    input: public/media/images/home
    output: /media/images/home
    extensions: [jpg, jpeg, png, webp]
    categories: [image]
    rename: safe

  - name: projectImages
    label: Project images
    input: public/media/images/projects
    output: /media/images/projects
    extensions: [jpg, jpeg, png, webp]
    categories: [image]
    rename: safe

content:
  - name: home
    label: Home
    type: file
    path: src/data/home.json
    format: json
    fields:
      - name: eyebrow
        label: Eyebrow
        type: string
        required: true
      - name: heading
        label: Heading
        type: string
        required: true
      - name: introduction
        label: Introduction
        type: text
        required: true
      - name: heroImage
        label: Hero image
        type: image
        options:
          media: homeImages
      - name: heroImageAlt
        label: Hero image description
        type: string

  - name: projects
    label: Projects
    type: file
    path: src/data/projects.json
    format: json
    list: true
    fields:
      - name: name
        label: Project name
        type: string
        required: true
      - name: slug
        label: URL slug
        type: string
        required: true
        pattern: "^[a-z0-9-]+$"
      - name: location
        label: Location
        type: string
        required: true
      - name: discipline
        label: Discipline
        type: string
        required: true
      - name: year
        label: Year
        type: number
        required: true
      - name: description
        label: Project description
        type: text
        required: true
      - name: image
        label: Cover image
        type: image
        options:
          media: projectImages
      - name: imageAlt
        label: Cover image description
        type: string
      - name: gallery
        label: Project gallery
        type: image
        options:
          media: projectImages
          multiple:
            max: 8
          unique: true

  - name: contact
    label: Contact
    type: file
    path: src/data/contact.json
    format: json
    fields:
      - name: eyebrow
        label: Eyebrow
        type: string
        required: true
      - name: heading
        label: Heading
        type: string
        required: true
      - name: introduction
        label: Introduction
        type: text
        required: true
      - name: email
        label: Email address
        type: string
        required: true
      - name: phone
        label: Phone number
        type: string
      - name: whatsapp
        label: WhatsApp number
        type: string
        required: true
      - name: address
        label: Address
        type: text